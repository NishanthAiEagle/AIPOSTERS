<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Video Try-On</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  overflow: hidden;
}

/* Debug overlay - shows errors on screen */
#debugOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  background: rgba(255,0,0,0.85);
  color: #fff;
  font-size: 13px;
  padding: 8px 12px;
  z-index: 9999;
  display: none;
  word-break: break-all;
}

/* Loading indicator */
#loadingOverlay {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 16px;
  z-index: 500;
  text-align: center;
}

#logo {
  position: absolute;
  top: 0px; left: 0px;
  width: 100px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

#toggleButton {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}

.plan-button {
  padding: 14px 22px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  background-color: rgba(0,0,0,0.5);
  color: #fff;
  cursor: pointer;
}

#instagramBtn {
  position: fixed;
  bottom: 80px; right: 20px;
  background: white;
  border-radius: 50%;
  width: 55px; height: 55px;
  opacity: 0;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 130;
}

#instagramBtn img { width: 35px; }

.a-enter-vr-button { display: none !important; }
</style>
</head>

<body>

<div id="debugOverlay"></div>
<div id="loadingOverlay">📷 Starting camera...</div>

<img src="logo1.png" id="logo">

<button id="toggleButton" class="plan-button">▶️ Play Video</button>

<div id="instagramBtn" onclick="window.open('https://www.instagram.com/','_blank')">
  <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg">
</div>


<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.01; filterBeta: 0.0001"
  renderer="antialias:true"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  loading-screen="enabled:false"
>

  <a-assets timeout="60000">

    <video
      id="plan1Video"
      src="plan1.mp4"
      playsinline
      webkit-playsinline
      loop
      muted
      preload="auto"
      crossorigin="anonymous">
    </video>

    <a-asset-item id="sanjiModel" src="Sanji.glb"></a-asset-item>

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-entity id="target1" mindar-image-target="targetIndex:0">

    <a-video
      id="videoDisplay"
      src="#plan1Video"
      position="0 0 0"
      width="1"
      height="0.75">
    </a-video>

    <!--
      Adjust position / scale / rotation once you can see it:
        position X Y Z  (0 = centre of target, negative Y = below)
        scale     make bigger e.g. "0.5 0.5 0.5"
        rotation  e.g. "0 180 0" to flip
    -->
    <a-entity
      id="sanjiEntity"
      gltf-model="#sanjiModel"
      position="0 -0.5 0.1"
      scale="0.3 0.3 0.3"
      rotation="0 0 0"
      visible="false">
    </a-entity>

  </a-entity>

</a-scene>


<script>

// ── Helpers ────────────────────────────────────────────────────────────────
function showDebug(msg) {
  const el = document.getElementById('debugOverlay');
  el.style.display = 'block';
  el.textContent = '⚠️ ' + msg;
  console.error(msg);
}

// Catch all unhandled JS errors and show on screen
window.addEventListener('error', e => showDebug(e.message + ' (' + e.filename + ':' + e.lineno + ')'));
window.addEventListener('unhandledrejection', e => showDebug('Promise error: ' + e.reason));

// ── Wait for A-Frame scene to load ─────────────────────────────────────────
const sceneEl = document.querySelector('a-scene');

// Hide loading text once scene is ready
sceneEl.addEventListener('renderstart', () => {
  document.getElementById('loadingOverlay').style.display = 'none';
});

sceneEl.addEventListener('loaded', function () {

  const videoEl      = document.getElementById('plan1Video');
  const toggleButton = document.getElementById('toggleButton');
  const instagramBtn = document.getElementById('instagramBtn');
  const logo         = document.getElementById('logo');
  const target       = document.getElementById('target1');
  const sanjiEntity  = document.getElementById('sanjiEntity');

  if (!target)       { showDebug('ERROR: #target1 not found'); return; }
  if (!sanjiEntity)  { showDebug('ERROR: #sanjiEntity not found'); return; }
  if (!videoEl)      { showDebug('ERROR: #plan1Video not found'); return; }

  let isPlaying = false;

  // ── Target found: show UI ──────────────────────────────────────────────
  target.addEventListener('targetFound', () => {
    [toggleButton, instagramBtn, logo].forEach(el => {
      el.style.opacity = '1';
      el.style.pointerEvents = 'auto';
    });
  });

  // ── Target lost: hide everything ──────────────────────────────────────
  target.addEventListener('targetLost', () => {
    [toggleButton, instagramBtn, logo].forEach(el => {
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    });
    videoEl.pause();
    sanjiEntity.setAttribute('visible', 'false');
    isPlaying = false;
    toggleButton.textContent = '▶️ Play Video';
  });

  // ── Play / Pause button ────────────────────────────────────────────────
  toggleButton.addEventListener('click', () => {
    if (!isPlaying) {
      const playPromise = videoEl.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => {
            sanjiEntity.setAttribute('visible', 'true');
            isPlaying = true;
            toggleButton.textContent = '⏸ Pause Video';
          })
          .catch(err => showDebug('Video play failed: ' + err));
      }
    } else {
      videoEl.pause();
      sanjiEntity.setAttribute('visible', 'false');
      isPlaying = false;
      toggleButton.textContent = '▶️ Play Video';
    }
  });

});


// ── Google Sheet Heartbeat ─────────────────────────────────────────────────
const SESSION_ID = "<?= sessionId ?>";

function sendHeartbeat() {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run.heartbeat(SESSION_ID);
  }
}
setInterval(sendHeartbeat, 5000);


// ── Security ───────────────────────────────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
    e.preventDefault();
  }
});

</script>

</body>
</html>
